name: 🚀 Template Validator CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
    - uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Type check
      run: bun run typecheck

    - name: Build
      run: bun run build

    - name: Self-test
      run: bun run test

  publish:
    name: 📦 Publish to npm
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        registry-url: 'https://registry.npmjs.org'
        package-manager-cache: false
    - uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build
      run: bun run build

    - name: Check if version is already published
      id: published
      run: |
        VERSION=$(node -p "require('./package.json').version")
        if npm view "@mvp-kit/template-validator@$VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "Version $VERSION already exists on npm, skipping publish."
        else
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Version $VERSION is new, publishing."
        fi

    - name: Publish to npm
      if: steps.published.outputs.skip == 'false'
      run: |
        VERSION=$(node -p "require('./package.json').version")

        if npm publish --provenance --access public --registry=https://registry.npmjs.org; then
          exit 0
        fi

        if npm view "@mvp-kit/template-validator@$VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
          echo "Version $VERSION is already published on npm; treating rerun as successful."
          exit 0
        fi

        echo "Publish failed and version $VERSION is not available on npm."
        exit 1
